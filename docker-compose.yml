services:
  frontend:
    build: ./react-app
    ports:
      - "5173:5173"
    volumes:
      - ./react-app:/app
      - /app/node_modules
    depends_on:
      - backend
      
  backend:
    build: ./backend-app
    ports:
      - "3000:3000"
    volumes:
      - ./backend-app:/app
      - /app/node_modules


